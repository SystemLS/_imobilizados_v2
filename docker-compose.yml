version: '3.8'

services:
  # ---------------------------------------------
  # 1. AplicaĂ§ĂŁo Laravel (PHP-FPM)
  # ---------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ativos_app
    container_name: ativos_app
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-ativos_v2}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - CACHE_DRIVER=${CACHE_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - LOG_CHANNEL=${LOG_CHANNEL:-stderr}
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/app/public:/var/www/html/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ativos_network

  # ---------------------------------------------
  # 2. Servidor Web (Nginx)
  # ---------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ativos_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Compartilha a pasta public para servir arquivos estĂˇticos
      - ./public:/var/www/html/public
    depends_on:
      - app
    networks:
      - ativos_network

  # ---------------------------------------------
  # 3. PostgreSQL
  # ---------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ativos_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-ativos_v2}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ativos_network

  # ---------------------------------------------
  # 4. Worker (Queue)
  # ---------------------------------------------
  queue:
    image: ativos_app
    container_name: ativos_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]
    environment:
      - DB_HOST=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - app
    networks:
      - ativos_network

  # ---------------------------------------------
  # 5. Scheduler (Cron)
  # ---------------------------------------------
  scheduler:
    image: ativos_app
    container_name: ativos_scheduler
    restart: unless-stopped
    command: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    environment:
      - DB_HOST=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - app
    networks:
      - ativos_network

volumes:
  pgsql_data:

networks:
  ativos_network:
    driver: bridge
