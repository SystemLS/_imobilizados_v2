version: '3.8'

services:
  # ---------------------------------------------
  # 1. AplicaĂ§ĂŁo Laravel (PHP-FPM)
  # ---------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ativos_app
    container_name: ativos_app
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-sqlsrv}
      - DB_HOST=${DB_HOST:-sqlserver}
      - DB_PORT=${DB_PORT:-1433}
      - DB_DATABASE=${DB_DATABASE:-GestaoImobilizado1}
      - DB_USERNAME=${DB_USERNAME:-sa}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=${CACHE_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - LOG_CHANNEL=${LOG_CHANNEL:-stderr}
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/app/public:/var/www/html/storage/app/public
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - ativos_network

  # ---------------------------------------------
  # 2. Servidor Web (Nginx)
  # ---------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ativos_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Compartilha a pasta public para servir arquivos estĂˇticos
      - ./public:/var/www/html/public
    depends_on:
      - app
    networks:
      - ativos_network

  # ---------------------------------------------
  # 3. Microsoft SQL Server
  # ---------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ativos_sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ativos_network

  # ---------------------------------------------
  # 4. Worker (Queue)
  # ---------------------------------------------
  queue:
    image: ativos_app
    container_name: ativos_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]
    environment:
      - DB_HOST=sqlserver
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - app
    networks:
      - ativos_network

  # ---------------------------------------------
  # 5. Scheduler (Cron)
  # ---------------------------------------------
  scheduler:
    image: ativos_app
    container_name: ativos_scheduler
    restart: unless-stopped
    command: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    environment:
      - DB_HOST=sqlserver
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - app
    networks:
      - ativos_network

volumes:
  mssql_data:

networks:
  ativos_network:
    driver: bridge
